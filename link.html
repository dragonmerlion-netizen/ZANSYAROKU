<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>関連リンク - 惨写録</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.png" type="image/png">
</head>

<body>
  <!-- 警告 -->
  <div id="age-check-overlay">
    <h1>あなたは18歳以上ですか？</h1>
    <p>このサイトには暴力的・残酷な表現が含まれます。18歳未満の方はご退出ください。</p>
    <p>閲覧により精神的・感情的な影響を受けたとしても、当サイト運営者は一切の責任を負いません。</p>
    <p>閲覧はあくまで自己責任で行ってください。</p>
    <p>不適切と感じる方は速やかにページを閉じてください。</p>
    <button onclick="confirmAge()">はい（18歳以上）</button>
  </div>

  <!-- ヘッダー -->
  <header>
    <div class="nav">
      <a href="index.html"><img src="logo.png" alt="惨写録ロゴ" class="logo"></a>
    </div>
    <nav>
      <a href="index.html">注意書き</a>
      <a href="list.html">事件一覧</a>
      <a href="link.html">リンク</a>
    </nav>
  </header>

  <div class="container">
    <h1>関連リンク</h1>

    <div class="link-box">
      <h2>Pixiv</h2>
      <p>イラストを公開しています。</p>
      <a href="https://www.pixiv.net/users/31232951" target="_blank">▶ Pixivを開く</a>
    </div>
    
  </div>

  <!-- フッター -->
  <footer>
    &copy; 惨写録 ｜ 創作事件資料アーカイブ
  </footer>

  <!-- スクリプト -->
  <button id="backToTop" title="トップに戻る">▲</button>

  <script>
    const backToTop = document.getElementById("backToTop");
    window.addEventListener("scroll", () => {
      backToTop.style.display = window.scrollY > 300 ? "block" : "none";
    });

    backToTop.addEventListener("click", () => {
      window.scrollTo({ top: 0, behavior: "smooth" });
    });

    function confirmAge() {
      localStorage.setItem('ageConfirmed', 'true');
      document.getElementById('age-check-overlay').classList.remove('active');
    }

    window.addEventListener('DOMContentLoaded', function () {
      if (!localStorage.getItem('ageConfirmed')) {
        document.getElementById('age-check-overlay').classList.add('active');
      }
    });
  </script>
</body>
</html>
